name: "Build and Test"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: "Build Matrix"
    runs-on: "ubuntu-latest"
    strategy:
      matrix:
        goos: ["linux", "darwin"]
        goarch: ["amd64", "arm64"]
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v6"

      - name: "Set up Go"
        uses: "actions/setup-go@v6"
        with:
          go-version: "1.25"

      - name: "Build all packages"
        run: |
          GOOS=${{ matrix.goos }} \
          GOARCH=${{ matrix.goarch }} \
          go build -v ./...

  test:
    name: "Unit Tests"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v6"

      - name: "Set up Go"
        uses: "actions/setup-go@v6"
        with:
          go-version: "1.25"

      - name: "Run tests"
        run: go test -v ./...
